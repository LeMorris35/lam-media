name: Deploy to GitHub Pages

# Run this whenever you push to the main branch (or trigger it manually).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions GitHub Pages needs to publish the site.
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, cancel the older build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site
        env:
          # Makes asset paths match your repo's URL (/<repo-name>)
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      # Stops GitHub Pages from hiding Next.js's _next folder
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
